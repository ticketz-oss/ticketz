<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Ícone balão de chat com raio -->
  <g transform="translate(0, 4)">
    <!-- Balão principal -->
    <rect x="4" y="4" width="56" height="44" rx="10" ry="10" fill="#FF7043"/>
    <!-- Cauda do balão -->
    <polygon points="16,48 8,64 32,48" fill="#FF7043"/>
    <!-- Raio / zap dentro do balão -->
    <polygon points="34,12 22,34 30,34 26,56 42,28 33,28 38,12" fill="#FFFFFF"/>
  </g>
  <!-- Texto Solution -->
  <text x="76" y="36" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FF7043" letter-spacing="-0.3">Solution</text>
  <!-- Texto Zap -->
  <text x="76" y="60" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">Zap</text>
  <!-- Ponto laranja decorativo -->
  <circle cx="136" cy="58" r="4" fill="#FF7043"/>
</svg>
