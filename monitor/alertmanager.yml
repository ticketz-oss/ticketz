global: {}

route:
  receiver: "default-receiver"
  group_by: ["alertname", "component", "companyId", "queue"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - receiver: "default-receiver"
      matchers:
        - severity="critical"
      repeat_interval: 1h

receivers:
  - name: "default-receiver"

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "component"]
